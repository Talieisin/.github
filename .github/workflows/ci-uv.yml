name: CI uv
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install ${{ inputs.python-version }}
      - name: Sync
        run: uv sync --locked --all-extras
      - name: Run ruff if configured
        run: |
          if uv run --no-sync python -c "import ruff" 2>/dev/null || grep -q 'ruff' pyproject.toml 2>/dev/null; then
            uv run ruff check . || true
          fi
      - name: Run tests
        run: |
          # Let pytest discover tests (test_*.py / *_test.py anywhere under cwd).
          # Exit code 5 means "no tests collected" — treat as success so the
          # workflow is safe to adopt in repos that don't have tests yet.
          set +e
          uv run pytest
          code=$?
          set -e
          if [ $code -eq 5 ]; then
            echo "No tests collected, skipping"
            exit 0
          fi
          exit $code
