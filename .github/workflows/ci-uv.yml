name: CI uv
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install ${{ inputs.python-version }}
      - name: Sync
        run: uv sync --locked --all-extras
      - name: Run ruff if configured
        run: |
          if uv run --no-sync python -c "import ruff" 2>/dev/null || grep -q 'ruff' pyproject.toml 2>/dev/null; then
            uv run ruff check . || true
          fi
      - name: Run tests if present
        run: |
          if [ -d "tests" ] || [ -d "test" ]; then
            uv run pytest
          else
            echo "No tests found, skipping"
          fi
