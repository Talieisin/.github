name: Gitleaks secret scan
on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: "8.24.3"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          VERSION: ${{ inputs.gitleaks-version }}
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -C /tmp -xz gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history
        run: gitleaks detect --redact --verbose --source . --exit-code 1
